<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>

<style>

body{
margin:0;
text-align:center;
font-family:Arial;
background:linear-gradient(120deg,#ffdde1,#ee9ca7);
overflow:hidden;
}

/* title */
h1{
margin-top:80px;
font-size:50px;
color:#c95986;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* button */
button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:#e995b1;
color:white;
cursor:pointer;
}

/* message */
#msg{
display:none;
font-size:22px;
margin-top:20px;
}

/* photo letter style */
.photo{
width:200px;
padding:10px;
background:white;
border-radius:12px;
box-shadow:0 12px 25px rgba(0,0,0,0.25);
transform:rotate(-2deg);
transition:0.4s;
}

.photo:hover{
transform:rotate(0deg) scale(1.05);
}

/* balloons */
.balloon{
width:80px;
height:90px;
border-radius:50%;
position:absolute;
bottom:-120px;
animation:float 8s linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* confetti */
.confetti{
width:10px;
height:10px;
position:absolute;
animation:blast 3s linear forwards;
}

@keyframes blast{
0%{transform:translate(0,0);}
100%{transform:translate(var(--x),var(--y));}
}

</style>
</head>

for(let i=0;i<10;i++){

/* surprise function */
function surprise(){

document.getElementById("msg").style.display="block";

/* confetti blast */
for(let i=0;i<80;i++){

let c=document.createElement("div");

document.body.appendChild(c);

}

}
